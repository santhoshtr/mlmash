
pages: # the job must be named pages
  image: ghcr.io/astral-sh/uv:python3.12
  stage: deploy
  script:
    - uv sync --frozen
    - uv run make
    - cp src/_redirects public/_redirects
  artifacts:
    paths:
      - public # artifact path must be /public for GitLab Pages to pick it up
  only:
    - master
